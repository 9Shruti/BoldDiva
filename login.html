{% extends "base.html" %}

{% block extra_css %}
<style>
    .auth-container {
        min-height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 4rem 2rem;
    }
    
    .auth-box {
        width: 100%;
        max-width: 450px;
        background-color: var(--color-bg-secondary);
        padding: 3rem;
        border-radius: 8px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    
    .auth-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    
    .auth-header h1 {
        font-size: 2.5rem;
        color: var(--color-accent);
        margin-bottom: 0.5rem;
    }
    
    .auth-header p {
        color: var(--color-text-muted);
    }
    
    .form-group {
        margin-bottom: 1.5rem;
    }
    
    .form-control {
        width: 100%;
        padding: 1rem;
        background-color: var(--color-bg);
        border: 1px solid var(--color-border);
        color: var(--color-text);
        border-radius: 4px;
        font-family: var(--font-body);
        transition: border-color var(--transition-fast);
    }
    
    .form-control:focus {
        outline: none;
        border-color: var(--color-accent);
    }
    
    .auth-footer {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.9rem;
        color: var(--color-text-muted);
    }
    
    .auth-footer a {
        color: var(--color-accent);
        font-weight: 600;
        margin-left: 0.5rem;
    }
    
    .input-wrap {
        position: relative;
    }
    .input-wrap .form-control {
        padding-right: 48px;
    }
    .password-toggle {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--color-text-muted);
        cursor: pointer;
        padding: 4px;
        transition: color var(--transition-fast);
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .password-toggle i, .password-toggle svg {
        width: 18px;
        height: 18px;
    }
    .password-toggle:hover {
        color: var(--color-accent);
    }
    .field-error {
        display: none;
        color: var(--color-accent);
        font-size: 0.78rem;
        margin-top: 0.3rem;
    }
    .form-control.is-invalid {
        border-color: var(--color-accent);
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <div class="auth-header">
            <h1>WELCOME BACK</h1>
            <p>Enter your details to access your Bolddiva account.</p>
        </div>
        
        {% if error %}
        <div class="error-msg" style="background: rgba(255, 0, 85, 0.1); color: var(--color-accent); padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 0.9rem;">{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="{% url 'login' %}" id="login-form" novalidate>
            {% csrf_token %}
            <div class="form-group">
                <input type="email" name="email" id="login-email" class="form-control" placeholder="Email Address" required>
                <span class="field-error"></span>
            </div>
            <div class="form-group">
                <div class="input-wrap">
                    <input type="password" id="login-pass" name="password" class="form-control" placeholder="Password" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('login-pass', this)">
                        <i data-lucide="eye"></i>
                    </button>
                </div>
                <span class="field-error"></span>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">SIGN IN</button>
        </form>
        
        <div class="auth-footer">
            Don't have an account? <a href="{% url 'signup' %}">Create one</a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function togglePassword(inputId, btnNode) {
        const input = document.getElementById(inputId);
        const icon = btnNode.querySelector('i');
        if (input.type === 'password') { input.type = 'text'; icon.setAttribute('data-lucide', 'eye-off'); }
        else { input.type = 'password'; icon.setAttribute('data-lucide', 'eye'); }
        lucide.createIcons();
    }
    
    document.getElementById('login-form').addEventListener('submit', function(e) {
        let ok = true;
        const email = document.getElementById('login-email');
        const pass = document.getElementById('login-pass');
        
        document.querySelectorAll('.field-error').forEach(el => { el.style.display = 'none'; });
        document.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
        
        if (!email.value.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
            email.classList.add('is-invalid');
            email.parentElement.querySelector('.field-error').textContent = 'Enter a valid email address';
            email.parentElement.querySelector('.field-error').style.display = 'block';
            ok = false;
        }
        if (!pass.value || pass.value.length < 4) {
            pass.classList.add('is-invalid');
            pass.parentElement.querySelector('.field-error').textContent = 'Password must be at least 4 characters';
            pass.parentElement.querySelector('.field-error').style.display = 'block';
            ok = false;
        }
        if (!ok) e.preventDefault();
    });
</script>
{% endblock %}
