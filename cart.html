{% extends "base.html" %}

{% block extra_css %}
<style>
    .cart-container {
        max-width: 1000px;
        margin: 2rem auto;
        padding: 0 1.5rem;
    }
    

    
    .cart-layout {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 2rem;
    }
    
    .cart-items-container {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
    }
    
    .cart-item {
        display: flex;
        gap: 1.5rem;
        padding: 1.5rem;
        background-color: var(--color-bg-secondary);
        border-radius: 8px;
    }
    
    .cart-item img {
        width: 100px;
        height: 100px;
        object-fit: cover;
        border-radius: 4px;
    }
    
    .cart-item-details {
        flex: 1;
    }
    
    .cart-summary {
        background-color: var(--color-bg-secondary);
        padding: 2rem;
        border-radius: 8px;
        height: fit-content;
    }
    
    .summary-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 1rem;
        color: var(--color-text-muted);
    }
    
    .summary-total {
        display: flex;
        justify-content: space-between;
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--color-border);
        font-family: var(--font-heading);
        font-size: 1.5rem;
        color: #fff;
        font-weight: 600;
    }
    
    .empty-cart {
        text-align: center;
        padding: 3rem;
        color: var(--color-text-muted);
    }

    @media (max-width: 768px) {
        .cart-layout { grid-template-columns: 1fr; gap: 1.5rem; }
        .cart-item img { width: 80px; height: 80px; }
        .cart-container { padding: 0 1rem; }
    }

    /* Quantity Stepper */
    .qty-stepper {
        display: inline-flex;
        align-items: center;
        background: var(--color-bg);
        border: 1px solid var(--color-border);
        border-radius: 50px;
        overflow: hidden;
        transition: border-color 0.2s ease;
    }
    
    .qty-stepper:hover {
        border-color: var(--color-accent);
    }
    
    .qty-stepper button {
        width: 36px;
        height: 36px;
        background: none;
        border: none;
        color: var(--color-text);
        font-size: 1.1rem;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
    }
    
    .qty-stepper button:hover {
        color: var(--color-accent);
        background: rgba(255, 0, 85, 0.1);
    }
    
    .qty-stepper button:active {
        transform: scale(0.9);
    }
    
    .qty-stepper .qty-value {
        min-width: 32px;
        text-align: center;
        font-family: var(--font-heading);
        font-weight: 700;
        font-size: 1rem;
        color: #fff;
        user-select: none;
    }
    
    .cart-item-actions {
        margin-top: 0.8rem;
        display: flex;
        align-items: center;
        gap: 1rem;
    }
    
    .remove-btn {
        background: none;
        border: none;
        color: var(--color-text-muted);
        cursor: pointer;
        font-size: 0.85rem;
        text-decoration: none;
        transition: color 0.2s ease;
        display: inline-flex;
        align-items: center;
        gap: 4px;
    }
    
    .remove-btn:hover {
        color: var(--color-accent);
    }
</style>
{% endblock %}

{% block content %}
<div class="modern-page-header">
    <div class="header-bg-glow"></div>
    <div class="header-content">
        <h1 class="animated-title">YOUR CART</h1>
        <div class="breadcrumb">
            <a href="{% url 'home' %}">Home</a> <i data-lucide="chevron-right"></i> <span>Cart</span>
        </div>
    </div>
</div>
<div class="cart-container" style="margin-top: 2rem;">
    
    <div class="cart-layout" id="cart-content">
        <!-- Javascript renders cart items here -->
        <div class="empty-cart">Loading cart...</div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const cartContent = document.getElementById('cart-content');
        let cart = JSON.parse(localStorage.getItem('bolddiva_cart')) || [];
        
        function saveCart() {
            localStorage.setItem('bolddiva_cart', JSON.stringify(cart));
        }
        
        function renderCart() {
            if (cart.length === 0) {
                cartContent.innerHTML = `
                    <div class="empty-cart" style="grid-column: 1/-1;">
                        <i data-lucide="shopping-bag" style="width: 64px; height: 64px; margin-bottom: 1rem; opacity: 0.5;"></i>
                        <h2>YOUR CART IS EMPTY</h2>
                        <p style="margin: 1rem 0 2rem;">Looks like you haven't made any bold choices yet.</p>
                        <a href="{% url 'shop' %}" class="btn btn-primary">START SHOPPING</a>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            let itemsHtml = '<div class="cart-items-container">';
            let subtotal = 0;
            
            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                subtotal += itemTotal;
                
                itemsHtml += `
                    <div class="cart-item">
                        <img src="${item.image}" alt="${item.name}">
                        <div class="cart-item-details">
                            <h3 style="font-size: 1.1rem; margin-bottom: 0.3rem;">${item.name}</h3>
                            <p style="color: var(--color-accent); font-family: var(--font-heading); font-weight: 600;">₹${item.price.toFixed(2)}</p>
                            <div class="cart-item-actions">
                                <div class="qty-stepper">
                                    <button class="qty-dec" data-index="${index}">−</button>
                                    <span class="qty-value">${item.quantity}</span>
                                    <button class="qty-inc" data-index="${index}">+</button>
                                </div>
                                <button class="remove-btn" data-index="${index}"><i data-lucide="trash-2" style="width:14px;height:14px;"></i> Remove</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            itemsHtml += '</div>';
            
            const summaryHtml = `
                <div class="cart-summary">
                    <h3 style="margin-bottom: 1.5rem; font-family: var(--font-heading);">ORDER SUMMARY</h3>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span>₹${subtotal.toFixed(2)}</span>
                    </div>
                    <div class="summary-row" style="align-items: flex-start; gap: 1rem;">
                        <span style="flex-shrink: 0;">Shipping</span>
                        <span style="text-align: right; flex: 1;">Calculated at checkout</span>
                    </div>
                    <div class="summary-total">
                        <span>Total</span>
                        <span>₹${subtotal.toFixed(2)}</span>
                    </div>
                    <a href="{% url 'checkout' %}" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;">PROCEED TO CHECKOUT</a>
                </div>
            `;
            
            cartContent.innerHTML = itemsHtml + summaryHtml;
            lucide.createIcons();
            
            // Attach event listeners
            document.querySelectorAll('.qty-dec').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(e.currentTarget.dataset.index);
                    if (cart[idx].quantity > 1) {
                        cart[idx].quantity--;
                    } else {
                        cart.splice(idx, 1);
                    }
                    saveCart();
                    renderCart();
                });
            });
            
            document.querySelectorAll('.qty-inc').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(e.currentTarget.dataset.index);
                    cart[idx].quantity++;
                    saveCart();
                    renderCart();
                });
            });
            
            document.querySelectorAll('.remove-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(e.currentTarget.dataset.index);
                    cart.splice(idx, 1);
                    saveCart();
                    renderCart();
                });
            });
        }
        
        renderCart();
    });
</script>
{% endblock %}
